<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schulte Family Directory</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-card">
        <h1>Schulte Family</h1>
        <p class="subtitle">Enter your info to access the family directory</p>
        <form id="login-form">
          <label for="login-first">First Name</label>
          <input type="text" id="login-first" placeholder="Your first name" required autocomplete="given-name">

          <label for="login-birth">Birthday</label>
          <input type="date" id="login-birth" required>

          <button type="submit" id="login-btn">Sign In</button>
          <p id="login-error" class="error" hidden>Name and birthday not found. Make sure your info is in the family database.</p>
        </form>
      </div>
    </div>

    <!-- Main App (after login) -->
    <div id="main-screen" class="screen">
      <nav>
        <div class="nav-brand">Schulte Family</div>
        <div class="nav-links">
          <a href="#directory" class="nav-link active" data-view="directory">Directory</a>
          <a href="#tree" class="nav-link" data-view="tree">Family Tree</a>
          <a href="#profile" class="nav-link" data-view="profile">My Info</a>
        </div>
        <button id="logout-btn" class="nav-logout">Sign Out</button>
      </nav>

      <!-- Directory View -->
      <div id="directory-view" class="view active">
        <div class="view-header">
          <h2>Family Directory</h2>
          <input type="text" id="search-input" placeholder="Search by name, city, state...">
        </div>
        <div class="directory-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="branch">By Branch</button>
          <button class="filter-btn" data-filter="upcoming">Upcoming Birthdays</button>
        </div>
        <div id="directory-list" class="card-grid"></div>
      </div>

      <!-- Family Tree View -->
      <div id="tree-view" class="view">
        <div class="view-header">
          <h2>Family Tree</h2>
          <div class="tree-controls">
            <button id="tree-zoom-in" title="Expand all">Expand All</button>
            <button id="tree-zoom-reset" title="Reset">Reset</button>
            <button id="tree-zoom-out" title="Collapse all">Collapse</button>
          </div>
        </div>
        <div id="tree-container"></div>
      </div>

      <!-- Profile Edit View -->
      <div id="profile-view" class="view">
        <div class="view-header">
          <h2>My Information</h2>
        </div>
        <form id="profile-form" class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name(s)</label>
              <input type="text" id="prof-names" readonly class="readonly">
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="prof-last" readonly class="readonly">
            </div>
          </div>

          <fieldset>
            <legend>Address</legend>
            <div class="form-group">
              <label>Street Address</label>
              <input type="text" id="prof-address">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" id="prof-city">
              </div>
              <div class="form-group form-group-sm">
                <label>State</label>
                <input type="text" id="prof-state" maxlength="2">
              </div>
              <div class="form-group form-group-sm">
                <label>Zip</label>
                <input type="text" id="prof-zip">
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Contact</legend>
            <div class="form-row">
              <div class="form-group">
                <label>Home Phone</label>
                <input type="tel" id="prof-home-phone">
              </div>
              <div class="form-group">
                <label>Cell Phone(s)</label>
                <input type="text" id="prof-cell">
              </div>
            </div>
            <div class="form-group">
              <label>Email(s)</label>
              <input type="email" id="prof-email">
            </div>
          </fieldset>

          <div class="form-actions">
            <button type="submit" id="prof-save-btn">Save Changes</button>
            <span id="prof-status" class="status-msg" hidden></span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
