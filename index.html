<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schulte Family Directory</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-card">
        <h1>Schulte Family</h1>
        <p class="subtitle">Enter your info to access the family directory</p>
        <form id="login-form">
          <label for="login-first">First Name</label>
          <input type="text" id="login-first" placeholder="Your first name" required autocomplete="given-name">

          <label for="login-birth">Birthday</label>
          <div class="login-birthday-row">
            <input type="text" id="login-birth" placeholder="MM/DD/YYYY" required autocomplete="bday" inputmode="numeric" pattern="[0-9/.\-]*" maxlength="10">
            <label class="birthday-picker-btn" for="login-birth-native">
              <span>Pick</span>
              <input type="date" id="login-birth-native" class="login-birth-native" aria-label="Pick birthday from calendar" autocomplete="bday">
            </label>
          </div>

          <button type="submit" id="login-btn">Sign In</button>
          <p id="login-error" class="error" hidden>Name and birthday not found. Make sure your info is in the family database.</p>
        </form>
      </div>
    </div>

    <!-- Main App (after login) -->
    <div id="main-screen" class="screen">
      <nav>
        <div class="nav-brand">Schulte Family</div>
        <div class="nav-links">
          <a href="#directory" class="nav-link active" data-view="directory">Directory</a>
          <a href="#tree" class="nav-link" data-view="tree">Family Tree</a>
          <a href="#profile" class="nav-link" data-view="profile">My Info</a>
          <a href="#reunion" class="nav-link nav-reunion" data-view="reunion">Camporee</a>
          <a href="#history" class="nav-link" data-view="history">History</a>
          <!-- Admin link — shown only for admin users via JS -->
          <a href="#admin" class="nav-link nav-admin" data-view="admin" style="display:none">Admin</a>
        </div>
        <button id="logout-btn" class="nav-logout">Sign Out</button>
      </nav>

      <!-- Directory View -->
      <div id="directory-view" class="view active">
        <div class="view-header">
          <h2>Family Directory</h2>
          <div class="dir-header-right">
            <input type="text" id="search-input" placeholder="Search by name, city, state...">
            <button id="print-directory-btn" class="btn-secondary print-hide" title="Print compact directory list">Print List</button>
          </div>
        </div>
        <div class="directory-filters print-hide">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="branch">By Branch</button>
          <button class="filter-btn" data-filter="upcoming">Birthdays</button>
          <span class="legend-note">✝ = deceased</span>
        </div>
        <div id="directory-list" class="card-grid"></div>
      </div>

      <!-- Family Tree View -->
      <div id="tree-view" class="view">
        <div class="view-header">
          <h2>Family Tree</h2>
          <div class="tree-header-right">
            <input type="text" id="tree-search-input" placeholder="Search tree..." class="tree-search">
            <div id="tree-search-results" class="tree-search-results"></div>
          </div>
          <div class="tree-controls">
            <button id="tree-zoom-in" title="Expand all">Expand All</button>
            <button id="tree-zoom-reset" title="Reset">Reset</button>
            <button id="tree-zoom-out" title="Collapse all">Collapse</button>
            <span class="legend-note">✝ = deceased</span>
          </div>
        </div>
        <div id="tree-container"></div>
      </div>

      <!-- Profile / My Info View -->
      <div id="profile-view" class="view"></div>

      <!-- Camporee View -->
      <div id="reunion-view" class="view"></div>
      <!-- Camporee History View -->
      <div id="history-view" class="view"></div>

      <!-- Admin Panel View -->
      <div id="admin-view" class="view"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
